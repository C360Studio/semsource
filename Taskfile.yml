version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build semsource binary
    cmds:
      - go build -o bin/semsource ./cmd/semsource

  lint:
    desc: Run Go linters (vet, fmt check, revive)
    cmds:
      # npm dependencies can contain unrelated Go source. Keep backend gates
      # scoped to SemSource packages even after the owned UI has been installed.
      - >-
        packages="$(go list ./...)" &&
        packages="$(printf '%s\n' "$packages" | grep -v '/ui/node_modules/')" &&
        go vet $packages
      - >-
        test -z "$(find . -path './ui/node_modules' -prune -o -name '*.go' -print |
        xargs gofmt -l)" ||
        (find . -path './ui/node_modules' -prune -o -name '*.go' -print |
        xargs gofmt -l && exit 1)
      - >-
        packages="$(go list ./...)" &&
        packages="$(printf '%s\n' "$packages" | grep -v '/ui/node_modules/')" &&
        revive -config revive.toml -formatter friendly $packages

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:race:
    desc: Run unit tests with race detector
    cmds:
      - go test -race ./...

  test:e2e:
    desc: Run e2e tests (requires Docker)
    cmds:
      - go test -tags=e2e -timeout 300s ./test/e2e/

  ui:e2e:
    desc: Run locked containerized Playwright against a running UI profile
    cmds:
      - ./scripts/ui-profile-e2e.sh

  ui:image:verify:
    desc: Build and verify the SemSource workbench production image
    cmds:
      - ./scripts/ui-image-verify.sh

  ui:smoke:
    desc: Smoke an immutable released SemSource UI image without host Node
    cmds:
      - ./scripts/ui-profile-smoke.sh released

  ui:smoke:dev:
    desc: Build ./ui, smoke the local UI profile, then tear it down
    cmds:
      - ./scripts/ui-profile-smoke.sh dev

  core:smoke:
    desc: Start the core profile, poll source-manifest status, then tear it down
    cmds:
      - ./scripts/core-profile-smoke.sh

  check:
    desc: Run all checks (lint + test)
    cmds:
      - task: lint
      - task: test
