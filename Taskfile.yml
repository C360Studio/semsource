version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build semsource binary
    cmds:
      - go build -o bin/semsource ./cmd/semsource

  lint:
    desc: Run Go linters (vet, fmt check, revive)
    cmds:
      - go vet ./...
      - test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - revive -config revive.toml -formatter friendly ./...

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:race:
    desc: Run unit tests with race detector
    cmds:
      - go test -race ./...

  test:e2e:
    desc: Run e2e tests (requires Docker)
    cmds:
      - go test -tags=e2e -timeout 300s ./test/e2e/

  ui:e2e:
    desc: Run Playwright smoke against the running UI profile
    vars:
      C360_PORT: '{{.C360_PORT | default "3000"}}'
    env:
      NODE_PATH: ui/node_modules
      UI_PROFILE_BASE_URL: 'http://127.0.0.1:{{.C360_PORT}}'
    cmds:
      - >-
        test -x "ui/node_modules/.bin/playwright" ||
        (echo "SemSource-owned Playwright is not installed in ui/." &&
        echo "Run npm --prefix ui ci." &&
        exit 1)
      - "ui/node_modules/.bin/playwright test --config test/ui/playwright.config.cjs"

  ui:image:verify:
    desc: Build and verify the SemSource workbench production image
    cmds:
      - ./scripts/ui-image-verify.sh

  ui:smoke:
    desc: Start the UI profile, run Playwright smoke, then tear it down
    cmds:
      - ./scripts/ui-profile-smoke.sh

  core:smoke:
    desc: Start the core profile, poll source-manifest status, then tear it down
    cmds:
      - ./scripts/core-profile-smoke.sh

  check:
    desc: Run all checks (lint + test)
    cmds:
      - task: lint
      - task: test
