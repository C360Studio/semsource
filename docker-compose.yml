# C360 SemSource Stack
#
# Two ways to run:
#
#   docker compose up                 # MVP CORE — NATS + semsource + semembed (tier-1
#                                     #   semantic search out of the box). No sibling repo
#                                     #   needed. semsource HTTP/MCP published on :8080.
#   docker compose --profile ui up    # + semstreams-ui dashboard + Caddy reverse proxy
#                                     #   (requires the ../semstreams-ui repo checked out).
#
# The core profile is the shippable MVP: point an agent at the MCP gateway and query.
# The `ui` profile layers the monitoring dashboard on top for local operators.
#
# Port map:
#   8080  — semsource ServiceManager HTTP API + MCP gateway (PUBLISHED in core profile)
#   4222  — NATS JetStream/KV (internal Docker network)
#   8081  — semembed OpenAI-compatible embeddings (internal Docker network)
#   7890  — semsource legacy graph WebSocket (internal; proxied via Caddy in ui profile)
#   8082  — semsource GraphQL gateway (internal; proxied via Caddy in ui profile)
#   9091  — semsource Prometheus metrics (internal; proxied via Caddy in ui profile)
#   5173  — semstreams-ui Vite dev (ui profile; proxied via Caddy)
#   3000  — Caddy entry point (ui profile: UI, GraphQL, status APIs, legacy graph WebSocket)
#
# Core-profile access:
#   http://localhost:8080/mcp-gateway/mcp         — MCP gateway (point Claude Code / an agent here)
#   http://localhost:8080/source-manifest/status  — SemSource readiness/status
#
# ui-profile access (adds Caddy on :3000):
#   http://localhost:3000                         — SemStreams UI dashboard
#   http://localhost:3000/graphql                 — GraphQL gateway
#   http://localhost:3000/source-manifest/status  — SemSource readiness/status
#   ws://localhost:3000/graph                     — Legacy raw GRAPH stream

services:
  # SemSource — graph ingestion engine
  semsource:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: c360-semsource
    # Publish the ServiceManager HTTP API + MCP gateway to the host so an agent can
    # reach it directly in the core profile (no Caddy). In the ui profile Caddy also
    # proxies it on :3000.
    ports:
      - "${SEMSOURCE_HTTP_PORT:-8080}:8080"
    volumes:
      - ./configs:/etc/semsource:ro
      # Mount source directories for ingestion (adjust to your project)
      - ${SEMSOURCE_TARGET:-.}:/workspace:ro
    environment:
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
    command:
      - run
      - --config
      - /etc/semsource/${SEMSOURCE_CONFIG:-mvp.json}
      - --log-level
      - ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      nats:
        condition: service_healthy
      semembed:
        condition: service_healthy
    networks:
      - c360
    restart: unless-stopped

  # semembed — OpenAI-compatible embeddings (tier-1 semantic search).
  # Default config (configs/mvp.json) points graph.embedder_type=http at this service.
  # First-index embedding is CPU-heavy (arctic-embed-s / ONNX fans out across cores);
  # SEMEMBED_CPUS caps it for local dev — see configs/tiers/README.md.
  semembed:
    image: ghcr.io/c360studio/semembed:latest
    container_name: c360-semembed
    environment:
      - SEMEMBED_PORT=8081
      - SEMEMBED_MODEL=${SEMEMBED_MODEL:-Snowflake/snowflake-arctic-embed-s}
    deploy:
      resources:
        limits:
          cpus: "${SEMEMBED_CPUS:-2}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - c360
    restart: unless-stopped

  # SemStreams UI — monitoring dashboard and flow builder.
  # Only runs under `--profile ui`; requires the ../semstreams-ui repo (UI_CONTEXT).
  ui:
    profiles: ["ui"]
    build:
      context: ${UI_CONTEXT:-../semstreams-ui}
      dockerfile: Dockerfile.dev
    container_name: c360-ui
    volumes:
      - ${UI_CONTEXT:-../semstreams-ui}/src:/app/src
      - ${UI_CONTEXT:-../semstreams-ui}/static:/app/static
      - ${UI_CONTEXT:-../semstreams-ui}/svelte.config.js:/app/svelte.config.js
      - ${UI_CONTEXT:-../semstreams-ui}/vite.config.ts:/app/vite.config.ts
      - ${UI_CONTEXT:-../semstreams-ui}/tsconfig.json:/app/tsconfig.json
      - ui-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      # Backend not wired yet — UI runs in standalone/monitor mode
      - BACKEND_HOST=${BACKEND_HOST:-host.docker.internal:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - c360
    restart: unless-stopped

  # Caddy — single entry point for the ui-profile stack.
  caddy:
    profiles: ["ui"]
    image: caddy:2-alpine
    container_name: c360-caddy
    depends_on:
      - semsource
      - ui
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "${C360_PORT:-3000}:3000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - c360
    restart: unless-stopped

  # NATS — JetStream/KV substrate for SemStreams graph state and governance
  nats:
    image: nats:2-alpine
    container_name: c360-nats
    command: ["-js", "-m", "8222", "--name", "c360-nats"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - c360

networks:
  c360:
    driver: bridge

volumes:
  ui-node-modules:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
