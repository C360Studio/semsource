# C360 SemSource Stack
#
# Runs semsource (governed graph ingestion), NATS, semstreams-ui
# (monitoring dashboard), and Caddy (reverse proxy).
#
# Port map:
#   3000  — Caddy entry point (UI, GraphQL, status APIs, legacy graph WebSocket)
#   4222  — NATS JetStream/KV (internal Docker network)
#   7890  — semsource legacy graph WebSocket (internal, proxied via Caddy)
#   8080  — semsource ServiceManager HTTP API (internal, proxied via Caddy)
#   8082  — semsource GraphQL gateway (internal, proxied via Caddy)
#   9091  — semsource Prometheus metrics (internal, proxied via Caddy)
#   5173  — semstreams-ui Vite dev (internal, proxied via Caddy)
#
# Usage:
#   docker compose up
#
# Access:
#   http://localhost:3000                         — SemStreams UI dashboard
#   http://localhost:3000/graphql                 — GraphQL gateway
#   http://localhost:3000/source-manifest/status  — SemSource readiness/status
#   ws://localhost:3000/graph                     — Legacy raw GRAPH stream

services:
  # SemSource — graph ingestion engine
  semsource:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: c360-semsource
    volumes:
      - ./configs:/etc/semsource:ro
      # Mount source directories for ingestion (adjust to your project)
      - ${SEMSOURCE_TARGET:-.}:/workspace:ro
    environment:
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
    command:
      - run
      - --config
      - /etc/semsource/${SEMSOURCE_CONFIG:-semsource.json}
      - --log-level
      - ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - c360
    restart: unless-stopped

  # SemStreams UI — monitoring dashboard and flow builder
  ui:
    build:
      context: ${UI_CONTEXT:-../semstreams-ui}
      dockerfile: Dockerfile.dev
    container_name: c360-ui
    volumes:
      - ${UI_CONTEXT:-../semstreams-ui}/src:/app/src
      - ${UI_CONTEXT:-../semstreams-ui}/static:/app/static
      - ${UI_CONTEXT:-../semstreams-ui}/svelte.config.js:/app/svelte.config.js
      - ${UI_CONTEXT:-../semstreams-ui}/vite.config.ts:/app/vite.config.ts
      - ${UI_CONTEXT:-../semstreams-ui}/tsconfig.json:/app/tsconfig.json
      - ui-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      # Backend not wired yet — UI runs in standalone/monitor mode
      - BACKEND_HOST=${BACKEND_HOST:-host.docker.internal:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - c360
    restart: unless-stopped

  # Caddy — single entry point for the stack
  caddy:
    image: caddy:2-alpine
    container_name: c360-caddy
    depends_on:
      - semsource
      - ui
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "${C360_PORT:-3000}:3000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - c360
    restart: unless-stopped

  # NATS — JetStream/KV substrate for SemStreams graph state and governance
  nats:
    image: nats:2-alpine
    container_name: c360-nats
    command: ["-js", "-m", "8222", "--name", "c360-nats"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - c360

networks:
  c360:
    driver: bridge

volumes:
  ui-node-modules:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
