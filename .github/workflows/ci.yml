name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install revive
        # Pinned (not @latest): warningCode=1 makes warnings fatal, so an
        # unpinned revive release could fail CI on a new rule with no code
        # change. Bump deliberately and re-run `task lint` locally to match.
        run: go install github.com/mgechev/revive@v1.15.0

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: revive
        run: revive -config revive.toml -formatter friendly ./...

  # NOTE: an `e2e` job (go test -tags=e2e) is intentionally NOT wired in yet.
  # Wiring it surfaced two real bugs (graph-gateway port-0, curator runtime-add
  # start-race) that are now fixed, plus a framework-level remove-teardown bug
  # tracked as semstreams#388. We defer gating CI on e2e until #388 is fixed so
  # TestE2E_RuntimeSourceAdd can pass end to end. See docs/upstream/semstreams-asks.md.

  build-and-push:
    needs: [test, lint]
    runs-on: ubuntu-latest
    # Runs on main pushes and on release tags (v*). Tag pushes produce the
    # versioned image; `latest` only moves on the default branch (not on a
    # pre-release beta tag).
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # Inject the resolved version into the binary. On a tag build this is
          # the semver (e.g. 1.0.0-beta.1); on main it's the branch/sha fallback.
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
