name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install revive
        # Pinned (not @latest): warningCode=1 makes warnings fatal, so an
        # unpinned revive release could fail CI on a new rule with no code
        # change. Bump deliberately and re-run `task lint` locally to match.
        run: go install github.com/mgechev/revive@v1.15.0

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: revive
        run: revive -config revive.toml -formatter friendly ./...

  e2e:
    runs-on: ubuntu-latest
    # Black-box tests: build the binary and drive it against a real NATS
    # (docker run nats:2-alpine) + JetStream. ubuntu-latest ships Docker. These
    # catch full-ServiceManager wiring bugs that unit/integration tests miss —
    # e.g. the graph-gateway port-0 and curator runtime-add start-race that
    # slipped precisely because e2e was not gated here.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: E2E tests
        # 600s (job-capped at 15m): black-box tests build the binary and seed a
        # real graph on a slow 2-core runner, well above local laptop timings.
        run: go test -tags=e2e -timeout 600s ./test/e2e/

  build-and-push:
    needs: [test, lint, e2e]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
